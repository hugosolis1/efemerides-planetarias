workflows:
  ios-unsigned:
    name: iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
          echo "=== Archivos generados ==="
          ls -la
          find . -name "*.xcodeproj" -type d

      - name: Build archive
        script: |
          XCODEPROJ=$(find . -name "*.xcodeproj" -type d | head -1)
          SCHEME=$(basename "$XCODEPROJ" .xcodeproj)
          echo "Usando proyecto: $XCODEPROJ"
          echo "Scheme: $SCHEME"
          xcodebuild archive \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/PlanetaryApp.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO

      - name: Package IPA
        script: |
          APP=$(find "$CM_BUILD_DIR/PlanetaryApp.xcarchive" -name "*.app" -type d | head -1)
          echo "App encontrado: $APP"
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -R "$APP" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r "PlanetaryApp_unsigned.ipa" Payload/
          ls -lh PlanetaryApp_unsigned.ipa

    artifacts:
      - $CM_BUILD_DIR/PlanetaryApp_unsigned.ipa
