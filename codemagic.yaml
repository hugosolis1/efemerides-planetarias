workflows:
  ios-unsigned:
    name: iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Fix assets and create project
        script: |
          set -e

          # Mover Assets.xcassets a la raíz donde Xcode lo busca
          cp -R PlanetaryApp/Assets.xcassets ./Assets.xcassets

          # Crear AppIcon vacío válido
          mkdir -p Assets.xcassets/AppIcon.appiconset
          cat > Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images": [],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF

          # Crear AccentColor válido
          mkdir -p Assets.xcassets/AccentColor.colorset
          cat > Assets.xcassets/AccentColor.colorset/Contents.json << 'EOF'
          {
            "colors": [{"color": {"color-space": "srgb","components": {"alpha": "1.000","blue": "0.000","green": "0.843","red": "1.000"}},"idiom": "universal"}],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF

          cat > Assets.xcassets/Contents.json << 'EOF'
          {"info": {"author": "xcode","version": 1}}
          EOF

          echo "✅ Assets listos"
          ls -la Assets.xcassets/

      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          set -e
          xcodegen generate --spec project.yml
          echo "✅ Proyecto generado:"
          ls -la *.xcodeproj/ 2>/dev/null || find . -name "*.xcodeproj" -type d

      - name: Build archive
        script: |
          set -e
          XCODEPROJ=$(find . -maxdepth 2 -name "*.xcodeproj" -type d | head -1)
          SCHEME=$(basename "$XCODEPROJ" .xcodeproj)
          echo "Proyecto: $XCODEPROJ | Scheme: $SCHEME"
          xcodebuild archive \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/PlanetaryApp.xcarchive" \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO

      - name: Package IPA
        script: |
          set -e
          APP=$(find "$CM_BUILD_DIR/PlanetaryApp.xcarchive" -name "*.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -R "$APP" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r "PlanetaryApp_unsigned.ipa" Payload/
          ls -lh PlanetaryApp_unsigned.ipa

    artifacts:
      - $CM_BUILD_DIR/PlanetaryApp_unsigned.ipa
